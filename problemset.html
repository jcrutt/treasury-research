html,body{height:100%}

#f{display:flex;flex-direction:column;gap:12px}
#pw{width:100%;padding:14px 16px;border-radius:10px;border:1px solid #34312a;background:#0a0a08;color:#F2EDE4;font-size:15px;font-family:inherit;outline:none;transition:.15s}

button{width:100%;padding:14px 16px;border-radius:10px;border:0;background:#C9A96E;color:#1b1813;font-weight:600;font-size:15px;font-family:inherit;cursor:pointer;transition:.15s}
button:hover{background:#d8bd8a}
button:disabled{opacity:.55;cursor:default}
.err{color:#e0a07a;font-size:13px;min-height:18px;margin-top:18px}
.foot{margin-top:28px;color:#5c574e;font-size:11px;letter-spacing:.09em;text-transform:uppercase}

async function unlock(p){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:SALT,iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:IV},key,CT);
  return new TextDecoder().decode(pt);
}
function render(html){document.open('text/html','replace');document.write(html);document.close();}
const f=document.getElementById('f'),pw=document.getElementById('pw'),err=document.getElementById('err'),btn=f.querySelector('button');
f.addEventListener('submit',async e=>{
  e.preventDefault();err.textContent='';btn.disabled=true;const t=btn.textContent;btn.textContent='Decrypting\u2026';
  try{const html=await unlock(pw.value);try{sessionStorage.setItem('tk',pw.value);}catch(_){}render(html);}
  catch(_){err.textContent='Incorrect passphrase. Try again.';btn.disabled=false;btn.textContent=t;pw.value='';pw.focus();}
});
(async()=>{try{const k=sessionStorage.getItem('tk');if(k){render(await unlock(k));}}catch(_){try{sessionStorage.removeItem('tk');}catch(__){}}})();
